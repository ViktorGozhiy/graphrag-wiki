# ABOUTME: Local infrastructure for the GraphRAG experiments — vector store and graph store.
# ABOUTME: Qdrant holds embeddings; Neo4j holds the knowledge graph. Data persists in named volumes.

services:
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: graphrag-qdrant
    ports:
      - "6333:6333"   # REST API + web dashboard (http://localhost:6333/dashboard)
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:2026.05.0
    container_name: graphrag-neo4j
    ports:
      - "7474:7474"   # HTTP browser (http://localhost:7474)
      - "7687:7687"   # Bolt (driver connections)
    environment:
      # Local dev credentials — not a secret. user: neo4j / pass: graphragdev
      NEO4J_AUTH: neo4j/graphragdev
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  qdrant_storage:
  neo4j_data:
  neo4j_logs:
